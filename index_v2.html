    <title>ポケモンずかん - ぜん1025ひき</title>
    <style>
        :root {
            --bg: #f4f6fb;
            --surface: #ffffff;
            --surface-2: #eef1f8;
            --text: #1d2433;
            --text-sub: #5d6b82;
            --accent: #e3350d;
            --accent-soft: #ffe8e2;
            --border: rgba(29, 36, 51, 0.10);
            --shadow: 0 2px 10px rgba(29, 36, 51, 0.08);
            --shadow-lg: 0 12px 32px rgba(29, 36, 51, 0.16);
            --radius: 16px;
        }

        html[data-theme="dark"] {
            --bg: #14171f;
            --surface: #1d2230;
            --surface-2: #272e40;
            --text: #eef1f8;
            --text-sub: #9aa6bb;
            --accent: #ff5c39;
            --accent-soft: #3a241e;
            --border: rgba(238, 241, 248, 0.10);
            --shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        * { -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'BIZ UDPGothic', 'Yu Gothic UI', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
            padding-bottom: env(safe-area-inset-bottom);
        }

        svg.icon {
            width: 1.15em;
            height: 1.15em;
            vertical-align: -0.2em;
            flex-shrink: 0;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 14px 16px 40px;
        }

        /* ===== ヘッダー ===== */
        header {
            position: relative;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 20px;
            background: linear-gradient(135deg, #e3350d 0%, #c4250b 55%, #8f1a06 100%);
            color: #fff;
            border-radius: var(--radius);
            margin-bottom: 16px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }
        header::after {
            content: '';
            position: absolute;
            right: -40px;
            top: -55px;
            width: 200px;
            height: 200px;
            border: 14px solid rgba(255,255,255,0.12);
            border-radius: 50%;
            pointer-events: none;
        }
        .logo-ball {
            width: 46px;
            height: 46px;
            flex-shrink: 0;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25));
        }
        header h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: 0.02em; line-height: 1.3; }
        header p { font-size: 0.85rem; opacity: 0.92; }

        .theme-toggle {
            position: absolute;
            top: 14px;
            right: 14px;
            z-index: 1;
            background: rgba(255, 255, 255, 0.18);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            transition: background 0.25s, transform 0.25s;
        }
        .theme-toggle:hover { background: rgba(255,255,255,0.35); transform: rotate(15deg); }
        .theme-toggle svg { width: 22px; height: 22px; }

        /* ===== とうけいバー ===== */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 8px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .stat-value { font-size: 1.35rem; font-weight: 800; color: var(--accent); line-height: 1.2; }
        .stat-label { font-size: 0.72rem; color: var(--text-sub); display: flex; align-items: center; justify-content: center; gap: 4px; }
        #favStatItem { cursor: pointer; transition: transform 0.15s; }
        #favStatItem:active { transform: scale(0.96); }

        /* ===== けんさく・フィルター ===== */
        .search-filter {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 18px;
            box-shadow: var(--shadow);
        }
        .search-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 220px;
        }
        .search-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-sub);
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            background: var(--bg);
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        .filter-select {
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            min-height: 44px;
        }

        /* とくべつフィルターボタン */
        .special-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .special-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 14px;
            min-height: 44px;
            border: 2px solid var(--border);
            border-radius: 999px;
            background: var(--bg);
            color: var(--text-sub);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.18s;
        }
        .special-btn:active { transform: scale(0.96); }
        .special-btn.active { color: #fff; border-color: transparent; box-shadow: var(--shadow); }
        .special-btn.fav.active     { background: linear-gradient(135deg, #f6b73c, #ec8b1f); }
        .special-btn.legend.active  { background: linear-gradient(135deg, #8d6cf6, #5b3ddb); }
        .special-btn.mythic.active  { background: linear-gradient(135deg, #ff7eb6, #e0489a); }
        .special-btn.gmax.active    { background: linear-gradient(135deg, #ef4444, #b91c1c); }
        .special-btn.reset {
            margin-left: auto;
            background: var(--accent);
            border-color: transparent;
            color: #fff;
            padding: 9px 22px;
            font-size: 0.95rem;
            box-shadow: 0 3px 10px color-mix(in srgb, var(--accent) 45%, transparent);
        }
        .special-btn.reset:hover { filter: brightness(1.1); }
        .special-btn.reset:active { transform: scale(0.93); }

        /* フィルターちゅうに ひょうじされる フローティングリセット */
        .floating-reset {
            position: fixed;
            bottom: calc(20px + env(safe-area-inset-bottom));
            left: 18px;
            display: none;
            align-items: center;
            gap: 7px;
            padding: 13px 22px;
            border: none;
            border-radius: 999px;
            background: var(--accent);
            color: #fff;
            font-size: 0.98rem;
            font-weight: 800;
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            z-index: 50;
            transition: transform 0.15s;
        }
        .floating-reset.show { display: inline-flex; }
        .floating-reset:active { transform: scale(0.93); }
        .floating-reset svg { width: 18px; height: 18px; }

        /* タイプフィルター */
        .filter-heading {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .type-filters {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
        }
        .type-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 13px;
            min-height: 40px;
            border-radius: 999px;
            font-size: 0.86rem;
            font-weight: 700;
            cursor: pointer;
            user-select: none;
            border: 2px solid color-mix(in srgb, var(--type-color) 65%, var(--text));
            color: color-mix(in srgb, var(--type-color) 65%, var(--text));
            background: transparent;
            transition: all 0.18s;
        }
        .type-chip:active { transform: scale(0.95); }
        .type-chip.active {
            background: var(--type-color);
            color: #fff;
            box-shadow: 0 3px 10px color-mix(in srgb, var(--type-color) 50%, transparent);
        }
        .type-chip.active::after {
            content: '✓';
            font-weight: 900;
            margin-left: 2px;
        }
        .type-chip.disabled { opacity: 0.3; pointer-events: none; }

        /* もじフィルター */
        .char-toggle-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 14px;
            padding: 9px 14px;
            min-height: 44px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text-sub);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.18s;
        }
        .char-toggle-btn.active { border-color: var(--accent); color: var(--accent); }
        .char-toggle-btn .chev { transition: transform 0.25s; }
        .char-toggle-btn.open .chev { transform: rotate(180deg); }
        .char-filters {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed var(--border);
        }
        .char-filters.open { display: block; }
        .char-filter-row { margin-bottom: 10px; }
        .char-filter-label {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-sub);
            display: block;
            margin-bottom: 6px;
        }
        .char-btn-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
        .char-btn {
            min-width: 38px;
            min-height: 38px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
        }
        .char-btn:active { transform: scale(0.92); }
        .char-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* ===== ポケモングリッド ===== */
        .pokemon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
        }
        .pokemon-card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 12px 14px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.18s, box-shadow 0.18s;
            overflow: hidden;
        }
        .pokemon-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .pokemon-card:active { transform: scale(0.97); }
        .card-bg {
            position: absolute;
            inset: 0 0 auto 0;
            height: 92px;
            background: linear-gradient(160deg, color-mix(in srgb, var(--type-color) 26%, var(--surface)) 0%, var(--surface) 95%);
            pointer-events: none;
        }
        .pokemon-number {
            position: relative;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-sub);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 1px 9px;
            display: inline-block;
        }
        .card-badge {
            position: absolute;
            top: 10px;
            right: 48px;
            z-index: 2;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .card-badge svg { width: 15px; height: 15px; }
        .card-badge.legend { background: linear-gradient(135deg, #8d6cf6, #5b3ddb); }
        .card-badge.mythic { background: linear-gradient(135deg, #ff7eb6, #e0489a); }
        .fav-btn {
            position: absolute;
            top: 7px;
            right: 7px;
            z-index: 2;
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: var(--surface);
            box-shadow: var(--shadow);
            color: #c3cad6;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, color 0.15s;
        }
        .fav-btn svg { width: 19px; height: 19px; }
        .fav-btn.active { color: #f6b73c; }
        .fav-btn.active svg { fill: #f6b73c; }
        .fav-btn:active { transform: scale(1.25); }
        .pokemon-image-container {
            position: relative;
            display: flex;
            justify-content: center;
            padding: 6px 0 2px;
        }
        .pokemon-image {
            width: 110px;
            height: 110px;
            object-fit: contain;
            transition: transform 0.25s;
        }
        .pokemon-card:hover .pokemon-image { transform: scale(1.08); }
        .pokemon-name {
            position: relative;
            font-size: 1.02rem;
            font-weight: 800;
            text-align: center;
            margin: 4px 0 8px;
            letter-spacing: 0.01em;
        }
        .pokemon-types {
            display: flex;
            justify-content: center;
            gap: 5px;
            flex-wrap: wrap;
        }
        .mini-type {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2.5px 9px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
            color: #fff;
            background: var(--type-color);
        }
        .mini-type svg { width: 11px; height: 11px; }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-sub);
        }
        .no-results svg { width: 56px; height: 56px; margin-bottom: 12px; opacity: 0.4; }
        .no-results p { font-size: 1.05rem; font-weight: 700; }

        /* ===== モーダル ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 24, 0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            overflow-y: auto;
            padding: 24px 14px;
        }
        .modal.show { display: flex; align-items: flex-start; justify-content: center; }
        .modal-content {
            background: var(--surface);
            border-radius: 22px;
            max-width: 560px;
            width: 100%;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            animation: modalIn 0.28s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            margin: auto 0;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(28px) scale(0.96); }
            to   { opacity: 1; transform: none; }
        }
        .modal-hero {
            position: relative;
            text-align: center;
            padding: 26px 20px 14px;
            background: linear-gradient(165deg, color-mix(in srgb, var(--type-color) 38%, var(--surface)) 0%, var(--surface) 100%);
        }
        .close-modal {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: var(--surface);
            color: var(--text-sub);
            box-shadow: var(--shadow);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        .close-modal svg { width: 20px; height: 20px; }
        .modal-fav {
            position: absolute;
            top: 12px;
            left: 12px;
        }
        .modal-number {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-sub);
        }
        .modal-hero img {
            width: 190px;
            height: 190px;
            object-fit: contain;
            filter: drop-shadow(0 10px 18px rgba(0,0,0,0.2));
        }
        .modal-hero h2 { font-size: 1.7rem; font-weight: 800; margin-top: 2px; }
        .modal-hero .pokemon-types { margin-top: 8px; }
        .modal-hero .mini-type { font-size: 0.82rem; padding: 4px 13px; }
        .modal-hero .mini-type svg { width: 13px; height: 13px; }
        .modal-badges {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
        }
        .modal-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.74rem;
            font-weight: 800;
            color: #fff;
            padding: 3px 11px;
            border-radius: 999px;
        }
        .modal-badge svg { width: 12px; height: 12px; }
        .modal-badge.legend { background: linear-gradient(135deg, #8d6cf6, #5b3ddb); }
        .modal-badge.mythic { background: linear-gradient(135deg, #ff7eb6, #e0489a); }
        .modal-badge.gmax   { background: linear-gradient(135deg, #ef4444, #b91c1c); }

        .modal-body { padding: 18px 20px 24px; }
        .detail-section { margin-bottom: 18px; }
        .detail-section h3 {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.92rem;
            font-weight: 800;
            color: var(--text-sub);
            margin-bottom: 8px;
        }
        .detail-section h3 svg { width: 17px; height: 17px; color: var(--accent); }
        .description-text {
            font-size: 1.02rem;
            line-height: 1.9;
            background: var(--surface-2);
            border-radius: 14px;
            padding: 14px 16px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .info-tile {
            background: var(--surface-2);
            border-radius: 14px;
            padding: 10px 14px;
        }
        .info-tile .label { font-size: 0.72rem; font-weight: 700; color: var(--text-sub); }
        .info-tile .value { font-size: 0.98rem; font-weight: 800; }
        .info-tile.games { grid-column: 1 / -1; }

        /* しんかチェーン */
        .evolution-chains {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .evolution-chain {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 4px;
            background: var(--surface-2);
            border-radius: 14px;
            padding: 14px 8px;
        }
        .evolution-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 6px;
            border-radius: 14px;
            border: 2px solid transparent;
            min-width: 86px;
            transition: all 0.18s;
        }
        .evolution-item img {
            width: 64px;
            height: 64px;
            object-fit: contain;
        }
        .evolution-name { font-size: 0.76rem; font-weight: 700; text-align: center; }
        .evolution-item.clickable { cursor: pointer; }
        .evolution-item.clickable:hover { background: var(--surface); }
        .evolution-item.selected {
            border-color: var(--accent);
            background: var(--surface);
            box-shadow: var(--shadow);
        }
        .evolution-item.current {
            background: color-mix(in srgb, var(--accent) 12%, transparent);
            border-color: color-mix(in srgb, var(--accent) 35%, transparent);
        }
        .evolution-item.current .evolution-name { color: var(--accent); }
        .current-tag {
            font-size: 0.6rem;
            font-weight: 800;
            color: var(--accent);
        }
        .evo-arrow { color: var(--text-sub); display: flex; }
        .evo-arrow svg { width: 18px; height: 18px; }
        .evo-go-bar {
            display: none;
            margin-top: 10px;
        }
        .evo-go-bar.show { display: block; animation: modalIn 0.2s ease; }
        .evo-go-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px;
            border: none;
            border-radius: 14px;
            background: var(--accent);
            color: #fff;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.15s, filter 0.15s;
        }
        .evo-go-btn:hover { filter: brightness(1.08); }
        .evo-go-btn:active { transform: scale(0.97); }
        .evo-go-btn svg { width: 18px; height: 18px; }

        /* キョダイマックスのすがた */
        .gmax-figure {
            text-align: center;
            background: linear-gradient(165deg, color-mix(in srgb, #ef4444 16%, var(--surface-2)) 0%, var(--surface-2) 100%);
            border-radius: 14px;
            padding: 16px 12px 12px;
        }
        .gmax-img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            filter: drop-shadow(0 8px 14px rgba(220, 38, 38, 0.25));
        }
        .gmax-caption {
            font-size: 0.85rem;
            font-weight: 800;
            color: #dc2626;
            margin-top: 6px;
        }
        html[data-theme="dark"] .gmax-caption { color: #f87171; }

        /* トップへもどる */
        .back-to-top {
            position: fixed;
            bottom: calc(20px + env(safe-area-inset-bottom));
            right: 18px;
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-lg);
            z-index: 50;
            transition: transform 0.15s;
        }
        .back-to-top.show { display: flex; }
        .back-to-top:active { transform: scale(0.9); }
        .back-to-top svg { width: 22px; height: 22px; }

        /* ===== レスポンシブ ===== */
        @media (max-width: 768px) {
            .pokemon-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
            header h1 { font-size: 1.3rem; }
            header { padding: 16px 14px; padding-right: 64px; }
            .special-btn.reset { margin-left: 0; }
        }
        @media (max-width: 430px) {
            .container { padding: 10px 10px 40px; }
            .pokemon-grid { grid-template-columns: 1fr 1fr; }
            .pokemon-image { width: 96px; height: 96px; }
            .stats-bar { gap: 6px; }
            .stat-value { font-size: 1.1rem; }
            .stat-label { font-size: 0.65rem; }
            .modal { padding: 12px 8px; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <svg class="logo-ball" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round">
                <circle cx="12" cy="12" r="9"/>
                <path d="M3.2 12h5.3M15.5 12h5.3"/>
                <circle cx="12" cy="12" r="3.3"/>
            </svg>
            <div>
                <h1>ポケモンずかん</h1>
                <p>ぽけもんが だいすきな みこちゃんへ・ぜん1025ひき</p>
            </div>
            <button id="themeToggle" class="theme-toggle" aria-label="ダークモードきりかえ"></button>
        </header>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">1025</div>
                <div class="stat-label">ぜんぶで</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="displayCount">0</div>
                <div class="stat-label">ひょうじちゅう</div>
            </div>
            <div class="stat-item stat-generation">
                <div class="stat-value" id="generationCount">9</div>
                <div class="stat-label">せだい</div>
            </div>
            <div class="stat-item" id="favStatItem" title="おきにいりだけひょうじ">
                <div class="stat-value" id="favCount">0</div>
                <div class="stat-label" id="favStatLabel">おきにいり</div>
            </div>
        </div>

        <div class="search-filter">
            <div class="search-row">
                <div class="search-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="なまえ・ばんごうで けんさく">
                </div>
                <select id="generationFilter" class="filter-select">
                    <option value="">すべてのせだい</option>
                    <option value="1">だい1せだい</option>
                    <option value="2">だい2せだい</option>
                    <option value="3">だい3せだい</option>
                    <option value="4">だい4せだい</option>
                    <option value="5">だい5せだい</option>
                    <option value="6">だい6せだい</option>
                    <option value="7">だい7せだい</option>
                    <option value="8">だい8せだい</option>
                    <option value="9">だい9せだい</option>
                </select>
            </div>

            <div class="special-filters">
                <button id="favFilterBtn" class="special-btn fav" title="おきにいりだけひょうじ"></button>
                <button id="legendFilterBtn" class="special-btn legend" title="でんせつのポケモンだけひょうじ"></button>
                <button id="mythicFilterBtn" class="special-btn mythic" title="まぼろしのポケモンだけひょうじ"></button>
                <button id="gmaxFilterBtn" class="special-btn gmax" title="キョダイマックスできるポケモンだけひょうじ"></button>
                <button id="clearFiltersBtn" class="special-btn reset" title="すべてのじょうけんをリセット"></button>
            </div>

            <div class="filter-heading" id="typeHeading">タイプで しぼりこむ</div>
            <div class="type-filters" id="typeFilters"></div>

            <button class="char-toggle-btn" id="charToggleBtn" title="はじまり・おわりのもじでしぼりこむ"></button>
            <div class="char-filters" id="charFilters">
                <div class="char-filter-row">
                    <span class="char-filter-label">はじまりの もじ</span>
                    <div class="char-btn-wrap" id="firstCharButtons"></div>
                </div>
                <div class="char-filter-row">
                    <span class="char-filter-label">おわりの もじ</span>
                    <div class="char-btn-wrap" id="lastCharButtons"></div>
                </div>
            </div>
        </div>

        <div id="pokemonGrid" class="pokemon-grid"></div>
    </div>

    <button class="back-to-top" id="backToTop" aria-label="トップへもどる"></button>
    <button class="floating-reset" id="floatingReset" aria-label="フィルターをリセット"></button>

    <div id="modal" class="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        // ===================================================================
        // SVGアイコン（えもじのかわりの かっこいいアイコン）
        // ===================================================================
        const UI_ICONS = {
            search:  '<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>',
            star:    '<path d="M12 3l2.7 5.6 6.1.9-4.4 4.3 1 6.1-5.4-2.9-5.4 2.9 1-6.1L3.2 9.5l6.1-.9z"/>',
            crown:   '<path d="M3 18h18M4 17l-1-9 5.5 4L12 5l3.5 7L21 8l-1 9z"/>',

            arrowUp: '<path d="M12 19V5"/><path d="m5 12 7-7 7 7"/>',

        const TYPE_ICONS = {
            'ノーマル':  '<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/>',
            'ほのお':    '<path d="M12 3s5 4.2 5 9a5 5 0 0 1-10 0c0-2 1-3.7 2.5-5.2C9.8 8.4 12 5.8 12 3z"/>',

            'じめん':    '<path d="m3 19 6-10 4 6 3-4 5 8z"/>',
            'ひこう':    '<path d="M20 4c-6 .5-12 5-14 12l-2 4 4-2c7-2 11.5-8 12-14z"/><path d="M7 15c4-1 7.5-3.5 9.5-7"/>',
            'エスパー':  '<path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>',
            'むし':      '<circle cx="12" cy="13.5" r="6"/><path d="m9 7-2-3.5M15 7l2-3.5"/><path d="M12 7.5v12"/>',
            'いわ':      '<path d="M8 4h8l5 6-9 10L3 10z"/><path d="M3 10h18"/>',
            'ゴースト':  '<path d="M12 3a7 7 0 0 0-7 7v10l3-2 2 2 2-2 2 2 2-2 3 2V10a7 7 0 0 0-7-7z"/><path d="M9.5 10h.01M14.5 10h.01"/>',
            'ドラゴン':  '<path d="M12 2.5 19 10l-7 11L5 10z"/><path d="M12 2.5V21"/>',
            'あく':      '<path d="M21 13A8.5 8.5 0 0 1 11 3a8 8 0 1 0 10 10z"/>',
            'はがね':    '<circle cx="12" cy="12" r="3.5"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.3 5.3l2.1 2.1M16.6 16.6l2.1 2.1M18.7 5.3l-2.1 2.1M7.4 16.6l-2.1 2.1"/>',
            'フェアリー':'<path d="M12 20s-7.5-4.6-9.3-9A5 5 0 0 1 12 7a5 5 0 0 1 9.3 4c-1.8 4.4-9.3 9-9.3 9z"/>'
        };

        function icon(name, set = UI_ICONS, cls = 'icon') {
            return `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${set[name] || ''}</svg>`;
        }
        function typeIcon(type) { return icon(type, TYPE_ICONS); }

        // ===================================================================
        // タイプじょうほう
        // ===================================================================
        const typeColors = {
            'ノーマル': '#9099A1', 'ほのお': '#FF9D55', 'みず': '#5090D6', 'でんき': '#F4D23C',
            'くさ': '#63BC5A', 'こおり': '#73CEC0', 'かくとう': '#CE416B', 'どく': '#AA6BC8',
            'じめん': '#D97845', 'ひこう': '#89AAE3', 'エスパー': '#FA7179', 'むし': '#91C12F',
            'いわ': '#C5B78C', 'ゴースト': '#5269AD', 'ドラゴン': '#0B6DC3', 'あく': '#5A5465',
            'はがね': '#5A8EA2', 'フェアリー': '#EC8FE6'
        };
        const allTypes = Object.keys(typeColors);

        // せだいごとの とうじょうゲーム
        const generationGames = {
            1: 'あか・みどり・あお・ピカチュウ',
            2: 'きん・ぎん・クリスタル',
            3: 'ルビー・サファイア・エメラルド',
            4: 'ダイヤモンド・パール・プラチナ',
            5: 'ブラック・ホワイト',
            6: 'X・Y',
            7: 'サン・ムーン',
            8: 'ソード・シールド',
            9: 'スカーレット・バイオレット'
        };

        // ===== ひらがな・カタカナせいきかユーティリティ =====
        function toHiragana(str) {
            return str.replace(/[ァ-ヶ]/g, ch =>
                String.fromCharCode(ch.charCodeAt(0) - 0x60)
            );
        }

        // ===================================================================
        // ポケモンデータ（ぜん1025ひき）
        // ===================================================================
        const pokemonData = [
            {id: 1, name: 'フシギダネ', types: ['くさ', 'どく'], generation: 1, description: 'うまれたときから せなかに ふしぎな タネが うえてある。からだと ともに タネも そだつという。', evolution: ['フシギダネ', 'フシギソウ', 'フシギバナ']},
            {id: 2, name: 'フシギソウ', types: ['くさ', 'どく'], generation: 1, description: 'つぼみが せなかに ついていて ようぶんを すいとるという。つぼみは おおきく そだち やがて おおきな はなが さく。', evolution: ['フシギダネ', 'フシギソウ', 'フシギバナ']},
            {id: 3, name: 'フシギバナ', types: ['くさ', 'どく'], generation: 1, description: 'じゅうぶんな えいようと たいようが はなの いろを あざやかに すると いわれる。はなの かおりは ひとの こころを いやす。', evolution: ['フシギダネ', 'フシギソウ', 'フシギバナ']},
            {id: 4, name: 'ヒトカゲ', types: ['ほのお'], generation: 1, description: 'うまれたときから しっぽに ほのおが ともっている。ほのおが きえたとき その いのちは おわって しまう。', evolution: ['ヒトカゲ', 'リザード', 'リザードン']},
            {id: 5, name: 'リザード', types: ['ほのお'], generation: 1, description: 'するどい ツメで ようしゃなく たたきのめす。きょうてきと むきあうと きぶんが たかぶり しっぽの ほのおが あおじろく もえあがる。', evolution: ['ヒトカゲ', 'リザード', 'リザードン']},
            {id: 6, name: 'リザードン', types: ['ほのお', 'ひこう'], generation: 1, description: 'くちから もえあがる ほのおの おんどは とても たかく いわをも とかしてしまう。', evolution: ['ヒトカゲ', 'リザード', 'リザードン']},
            {id: 7, name: 'ゼニガメ', types: ['みず'], generation: 1, description: 'うまれたばかりの ときは せなかの こうらが やわらかく ぷにぷにして やや しめっている。', evolution: ['ゼニガメ', 'カメール', 'カメックス']},
            {id: 8, name: 'カメール', types: ['みず'], generation: 1, description: 'ながい くびを こうらの なかに ひっこめるとき いきおいよく みずでっぽうを はっしゃする。', evolution: ['ゼニガメ', 'カメール', 'カメックス']},
            {id: 9, name: 'カメックス', types: ['みず'], generation: 1, description: 'こうらの ふんしゃこうの ねらいは せいかく。みずの だんがんを 50メートル はなれた あきかんに めいちゅうさせる。', evolution: ['ゼニガメ', 'カメール', 'カメックス']},
            {id: 10, name: 'キャタピー', types: ['むし'], generation: 1, description: 'あしの きゅうばんで どんな しゃめんも すべらずに のぼる。だいすきな はっぱを たべて おおきく なる。', evolution: ['キャタピー', 'トランセル', 'バタフリー']},
            {id: 11, name: 'トランセル', types: ['むし'], generation: 1, description: 'からが とても かたく ほとんど うごくことができない。てきに おそわれても じっと しているしかない。', evolution: ['キャタピー', 'トランセル', 'バタフリー']},
            {id: 12, name: 'バタフリー', types: ['むし', 'ひこう'], generation: 1, description: 'はなの みつが だいこうぶつ。みつの ありかを さがすため 10キロも とびまわる。', evolution: ['キャタピー', 'トランセル', 'バタフリー']},
            {id: 13, name: 'ビードル', types: ['むし', 'どく'], generation: 1, description: 'あたまの さきの するどい どくばりで みをまもる。まいにち じぶんの たいじゅうと おなじ りょうの はっぱを たべる。', evolution: ['ビードル', 'コクーン', 'スピアー']},
            {id: 14, name: 'コクーン', types: ['むし', 'どく'], generation: 1, description: 'せいちゅうに なるため いちじてきに からを つくる。かたい からに おおわれているが なかは やわらかい。', evolution: ['ビードル', 'コクーン', 'スピアー']},
            {id: 15, name: 'スピアー', types: ['むし', 'どく'], generation: 1, description: 'しゅうだんで あらわれる ことがある。もうスピードで とびまわり おしりの どくばりで さしまくる。', evolution: ['ビードル', 'コクーン', 'スピアー']},
            {id: 16, name: 'ポッポ', types: ['ノーマル', 'ひこう'], generation: 1, description: 'もりや もりの はずれに おおく せいそくする。おとなしい せいかくで たたかいより にげる ことを このむ。', evolution: ['ポッポ', 'ピジョン', 'ピジョット']},
            {id: 17, name: 'ピジョン', types: ['ノーマル', 'ひこう'], generation: 1, description: 'ひろい なわばりを もち しんにゅうする ものには ようしゃなく つついたり ひっかいたりして こうげきする。', evolution: ['ポッポ', 'ピジョン', 'ピジョット']},
            {id: 18, name: 'ピジョット', types: ['ノーマル', 'ひこう'], generation: 1, description: 'うつくしい もようの はねを もち マッハ2で そらを とぶ。むねを はって てきを いかくする。', evolution: ['ポッポ', 'ピジョン', 'ピジョット']},
            {id: 19, name: 'コラッタ', types: ['ノーマル'], generation: 1, description: 'どんな ばしょでも いきぬく せいめいりょくを もつ。けいかいしんが つよく ねている ときも みみを うごかす。', evolution: ['コラッタ', 'ラッタ']},
            {id: 20, name: 'ラッタ', types: ['ノーマル'], generation: 1, description: 'じょうぶな まえばは コンクリートの たてものも けずりとってしまう。ヒゲで バランスを たもつ。', evolution: ['コラッタ', 'ラッタ']},
            {id: 21, name: 'オニスズメ', types: ['ノーマル', 'ひこう'], generation: 1, description: 'くさむらの むしを たべる。はねが みじかいので ずっと とびつづける ことは できない。', evolution: ['オニスズメ', 'オニドリル']},
            {id: 22, name: 'オニドリル', types: ['ノーマル', 'ひこう'], generation: 1, description: 'おおきな つばさで 1にちじゅう とびつづける たいりょくを もつ。するどい くちばしで こうげきする。', evolution: ['オニスズメ', 'オニドリル']},
            {id: 23, name: 'アーボ', types: ['どく'], generation: 1, description: 'まったく おとを たてずに くさむらを すすむ。えものを みつけると まるのみに してしまう。', evolution: ['アーボ', 'アーボック']},
            {id: 24, name: 'アーボック', types: ['どく'], generation: 1, description: 'おなかの もようで てきを いかくする。もようは ちいきによって ちがいが あるらしい。', evolution: ['アーボ', 'アーボック']},
            {id: 25, name: 'ピカチュウ', types: ['でんき'], generation: 1, description: 'ほっぺたの りょうがわに ちいさい でんきぶくろを もつ。ピンチのときに ほうでんする。', evolution: ['ピチュー', 'ピカチュウ', 'ライチュウ']},
            {id: 26, name: 'ライチュウ', types: ['でんき'], generation: 1, description: '10まんボルトの でんげきを だすことができる。しっぽを じめんに さして じぶんの でんきを にがす。', evolution: ['ピチュー', 'ピカチュウ', 'ライチュウ']},
            {id: 27, name: 'サンド', types: ['じめん'], generation: 1, description: 'かんそうした すなじに すむ。きけんを かんじると からだを まるめて ボールのように なる。', evolution: ['サンド', 'サンドパン']},
            {id: 28, name: 'サンドパン', types: ['じめん'], generation: 1, description: 'まるまって せなかの はりを たてながら もうスピードで ころがって てきに たいあたりする。', evolution: ['サンド', 'サンドパン']},
            {id: 29, name: 'ニドラン♀', types: ['どく'], generation: 1, description: 'こがらで とても おとなしい。てきに おそわれると ちいさな どくばりで けんめいに たたかう。', evolution: ['ニドラン♀', 'ニドリーナ', 'ニドクイン']},
            {id: 30, name: 'ニドリーナ', types: ['どく'], generation: 1, description: 'なかまと いっしょに いるときは おたがいを きずつけない ように はりを ひっこめている。', evolution: ['ニドラン♀', 'ニドリーナ', 'ニドクイン']},
            {id: 31, name: 'ニドクイン', types: ['どく', 'じめん'], generation: 1, description: 'かたい うろこに おおわれた からだで ぶつかって くる。こどもを まもる とき もっとも つよい。', evolution: ['ニドラン♀', 'ニドリーナ', 'ニドクイン']},
            {id: 32, name: 'ニドラン♂', types: ['どく'], generation: 1, description: 'みみを うごかして きけんを さっちする。つのが おおきく はったつしており どくを だす。', evolution: ['ニドラン♂', 'ニドリーノ', 'ニドキング']},
            {id: 33, name: 'ニドリーノ', types: ['どく'], generation: 1, description: 'おこりっぽく すぐに けんかを ふっかける。あたまの つのは ダイヤモンドも つきやぶる。', evolution: ['ニドラン♂', 'ニドリーノ', 'ニドキング']},
            {id: 34, name: 'ニドキング', types: ['どく', 'じめん'], generation: 1, description: 'ふとい しっぽを ふりまわし てっとうも へしおる。あばれだすと だれにも とめられない。', evolution: ['ニドラン♂', 'ニドリーノ', 'ニドキング']},
            {id: 35, name: 'ピッピ', types: ['フェアリー'], generation: 1, description: 'あいくるしい すがたから ペットとして だいにんき。ただし なかなか みつける ことが できない。', evolution: ['ピィ', 'ピッピ', 'ピクシー']},
            {id: 36, name: 'ピクシー', types: ['フェアリー'], generation: 1, description: 'しずかな やまおくで なかまと くらす。ようせいの なかまで とても めずらしい ポケモン。', evolution: ['ピィ', 'ピッピ', 'ピクシー']},

            {id: 43, name: 'ナゾノクサ', types: ['くさ', 'どく'], generation: 1, description: 'ひるまは ねっこを じめんに うめて うごかない。よるに なると たねを まきちらしながら あるく。', evolution: ['ナゾノクサ', 'クサイハナ', 'ラフレシア']},
            {id: 44, name: 'クサイハナ', types: ['くさ', 'どく'], generation: 1, description: 'とても くさい においを はなつ。きけんを かんじると さらに においが つよくなる という。', evolution: ['ナゾノクサ', 'クサイハナ', 'ラフレシア']},

            {id: 46, name: 'パラス', types: ['むし', 'くさ'], generation: 1, description: 'きの ねっこ から ようぶんを すって そだつ。せなかの キノコも いっしょに そだっていく。', evolution: ['パラス', 'パラセクト']},

            {id: 48, name: 'コンパン', types: ['むし', 'どく'], generation: 1, description: 'おおきな ふくがんは レーダーの やくわりを もつ。くらやみでも えものを みつけだす。', evolution: ['コンパン', 'モルフォン']},
            {id: 49, name: 'モルフォン', types: ['むし', 'どく'], generation: 1, description: 'はねに ついている りんぷんは もうどく。はばたく たびに どくの こなを まきちらす。', evolution: ['コンパン', 'モルフォン']},
            {id: 50, name: 'ディグダ', types: ['じめん'], generation: 1, description: 'ちか 1メートル くらいを ほりすすんで くらす。ほった あとは はたけに ちょうどいい らしい。', evolution: ['ディグダ', 'ダグトリオ']},

            {id: 52, name: 'ニャース', types: ['ノーマル'], generation: 1, description: 'まるくて キラキラ かがやく ものが だいすき。みつけると ひたいの こばんも かがやきだす。', evolution: ['ニャース', 'ペルシアン']},
            {id: 53, name: 'ペルシアン', types: ['ノーマル'], generation: 1, description: 'けだかく ほこりたかい ポケモン。きげんが わるいと するどい つめで ひっかかれる。', evolution: ['ニャース', 'ペルシアン']},
            {id: 54, name: 'コダック', types: ['みず'], generation: 1, description: 'いつも ずつうに なやまされている。ずつうが はげしくなると ふしぎな ちからを つかえるようになる。', evolution: ['コダック', 'ゴルダック']},

            {id: 253, name: 'ジュプトル', types: ['くさ'], generation: 3, description: 'もりの なかを ジャンプして いどうする すがたは みえなくなる ほどの スピード。', evolution: ['キモリ', 'ジュプトル', 'ジュカイン']},
            {id: 254, name: 'ジュカイン', types: ['くさ'], generation: 3, description: 'うでの はっぱは するどい はもの。すばやい うごきで てきの ふところに とびこみ きりさく。', evolution: ['キモリ', 'ジュプトル', 'ジュカイン']},
            {id: 255, name: 'アチャモ', types: ['ほのお'], generation: 3, description: 'おなかに ほのおぶくろを もつ。だきしめると ぽかぽか あたたかい。', evolution: ['アチャモ', 'ワカシャモ', 'バシャーモ']},
            {id: 256, name: 'ワカシャモ', types: ['ほのお', 'かくとう'], generation: 3, description: '1びょうかんに 10はつの キックを くりだす あしわざの めいしゅ。なきごえを あげて いかくする。', evolution: ['アチャモ', 'ワカシャモ', 'バシャーモ']},
            {id: 257, name: 'バシャーモ', types: ['ほのお', 'かくとう'], generation: 3, description: 'ビルを とびこえる ほどの ジャンプりょくを もつ。てくびから ほのおを だして パンチを はなつ。', evolution: ['アチャモ', 'ワカシャモ', 'バシャーモ']},
            {id: 258, name: 'ミズゴロウ', types: ['みず'], generation: 3, description: 'あたまの ひれは とても びんかんな レーダー。みずの なかの ようすを しらべて なにが いるのか あてることができる。', evolution: ['ミズゴロウ', 'ヌマクロー', 'ラグラージ']},
            {id: 259, name: 'ヌマクロー', types: ['みず', 'じめん'], generation: 3, description: 'どろあそびが だいすき。かわくと どろが かたくなり みをまもる よろいに なる。', evolution: ['ミズゴロウ', 'ヌマクロー', 'ラグラージ']},
            {id: 260, name: 'ラグラージ', types: ['みず', 'じめん'], generation: 3, description: 'おおがたせんを ひっぱって およぐ ちからもち。にごった みずの なかでも めが みえる。', evolution: ['ミズゴロウ', 'ヌマクロー', 'ラグラージ']},
            {id: 261, name: 'ポチエナ', types: ['あく'], generation: 3, description: 'うごく ものを みつけると すぐに かみつく。しつこく おいかけまわすが はんげきされると にげる。', evolution: ['ポチエナ', 'グラエナ']},
            {id: 262, name: 'グラエナ', types: ['あく'], generation: 3, description: 'むれで こうどうする。リーダーの めいれいには ぜったいに したがう ちゅうじつな せいかく。', evolution: ['ポチエナ', 'グラエナ']},
            {id: 263, name: 'ジグザグマ', types: ['ノーマル'], generation: 3, description: 'こうきしんが つよく あちこち ジグザグに あるきまわる。おちている ものを ひろうのが すき。', evolution: ['ジグザグマ', 'マッスグマ']},
            {id: 264, name: 'マッスグマ', types: ['ノーマル'], generation: 3, description: 'まっすぐにしか はしれないが その スピードは じそく100キロ を こえる。', evolution: ['ジグザグマ', 'マッスグマ']},
            {id: 265, name: 'ケムッソ', types: ['むし'], generation: 3, description: 'もりや くさむらに すむ。おしりの どくばりで てきを さして みをまもる。', evolution: ['ケムッソ', 'カラサリス', 'アゲハント']},
            {id: 266, name: 'カラサリス', types: ['むし'], generation: 3, description: 'かたい からの なかで しんかの じゅんびを している。わずかな すきまから そとの ようすを うかがう。', evolution: ['ケムッソ', 'カラサリス', 'アゲハント']},
            {id: 267, name: 'アゲハント', types: ['むし', 'ひこう'], generation: 3, description: 'あまい はなの みつが だいすき。ストローのような くちで みつを すいとる。', evolution: ['ケムッソ', 'カラサリス', 'アゲハント']},
            {id: 268, name: 'マユルド', types: ['むし'], generation: 3, description: 'くちから はきだした いとを からだに まきつけて まゆに なる。からの なかは あつい。', evolution: ['ケムッソ', 'マユルド', 'ドクケイル']},
            {id: 269, name: 'ドクケイル', types: ['むし', 'どく'], generation: 3, description: 'がいとうの ひかりに あつまる。はばたくと もうどくの こなが まいちる。', evolution: ['ケムッソ', 'マユルド', 'ドクケイル']},
            {id: 270, name: 'ハスボー', types: ['みず', 'くさ'], generation: 3, description: 'みずくさに ぎたいしている。きれいな すいしつを このみ よごれると べつの いけへ いどうする。', evolution: ['ハスボー', 'ハスブレロ', 'ルンパッパ']},

            {id: 272, name: 'ルンパッパ', types: ['みず', 'くさ'], generation: 3, description: 'ようきな おんがくを きくと からだの さいぼうが かっぱつになり リズムに のって おどりだす。', evolution: ['ハスボー', 'ハスブレロ', 'ルンパッパ']},
            {id: 273, name: 'タネボー', types: ['くさ'], generation: 3, description: 'どんぐりの ような すがた。きの えだに ぶらさがり すいぶんを すって そだつ。', evolution: ['タネボー', 'コノハナ', 'ダーテング']},
            {id: 274, name: 'コノハナ', types: ['くさ', 'あく'], generation: 3, description: 'もりの おくふかくに すむ。はっぱを ふえのように ふいて ふあんに させる おとを だす。', evolution: ['タネボー', 'コノハナ', 'ダーテング']},

            {id: 276, name: 'スバメ', types: ['ノーマル', 'ひこう'], generation: 3, description: 'あたたかい とちを もとめて 1にち 300キロも とぶ。やすむ ときは なかまと よりそう。', evolution: ['スバメ', 'オオスバメ']},

            {id: 278, name: 'キャモメ', types: ['みず', 'ひこう'], generation: 3, description: 'うみかぜに のって かっくうする。ふゆが ちかづくと エサを ためこむ しゅうせいがある。', evolution: ['キャモメ', 'ペリッパー']},
            {id: 279, name: 'ペリッパー', types: ['みず', 'ひこう'], generation: 3, description: 'おおきなくちばしで うみの みずを すくいとり こざかなごと のみこんで しまう。', evolution: ['キャモメ', 'ペリッパー']},

            {id: 283, name: 'アメタマ', types: ['みず', 'むし'], generation: 3, description: 'いけや ぬまの すいめんを すべるように いどうする。あたまから あまい においを だす。', evolution: ['アメタマ', 'アメモース']},

            {id: 289, name: 'ケッキング', types: ['ノーマル'], generation: 3, description: 'せかいいち ぐうたらな ポケモン だが じつは ためこんだ パワーを いっきに ときはなてる。', evolution: ['ナマケロ', 'ヤルキモノ', 'ケッキング']},

            {id: 299, name: 'ノズパス', types: ['いわ'], generation: 3, description: 'じしゃくの はなは つねに きたを むいている。ノズパスどうしが ちかづくと はんぱつしあう。', evolution: ['ノズパス', 'ダイノーズ']},

            {id: 315, name: 'ロゼリア', types: ['くさ', 'どく'], generation: 3, description: 'きれいな みずを のんで そだつと うでの はなが あざやかに さく。はなの かおりは リラックス こうかがある。', evolution: ['スボミー', 'ロゼリア', 'ロズレイド']},

            {id: 330, name: 'フライゴン', types: ['じめん', 'ドラゴン'], generation: 3, description: 'すなあらしの なかから うたごえの ような はおとが きこえるため さばくの せいれい と よばれる。', evolution: ['ナックラー', 'ビブラーバ', 'フライゴン']},

            {id: 332, name: 'ノクタス', types: ['くさ', 'あく'], generation: 3, description: 'よるに なると さばくの たびびとの うしろを ついてあるき つかれて うごけなくなるのを まつ。', evolution: ['サボネア', 'ノクタス']},

            {id: 337, name: 'ルナトーン', types: ['いわ', 'エスパー'], generation: 3, description: 'いんせきの らっか あとで はっけんされた。まんげつの よるに なると かっぱつに うごく。', evolution: ['ルナトーン']},

            {id: 340, name: 'ナマズン', types: ['みず', 'じめん'], generation: 3, description: 'なわばりいしきが つよく ぬまに ちかづく ものは おおあばれして じしんを おこし おいはらう。', evolution: ['ドジョッチ', 'ナマズン']},

            {id: 349, name: 'ヒンバス', types: ['みず'], generation: 3, description: 'ボロボロの すがたの ため だれも みむきも しない。みずくさの おおい いけに すむ。', evolution: ['ヒンバス', 'ミロカロス']},

            {id: 492, name: 'シェイミ', types: ['くさ'], generation: 4, description: 'くうきちゅうの どくそを ぶんかいして あれはてた だいちを いっしゅんで はなばたけに かえる ちからがある。', evolution: ['シェイミ']},
            {id: 493, name: 'アルセウス', types: ['ノーマル'], generation: 4, description: 'なにも ない ばしょから たまごで すがたを あらわし せかいを つくったと シンオウしんわに かたられる ポケモン。', evolution: ['アルセウス']},
            {id: 494, name: 'ビクティニ', types: ['エスパー', 'ほのお'], generation: 5, description: 'ビクティニを つれた トレーナーは どんな しあいにも かてると いわれている。むげんの エネルギーを うみだす。', evolution: ['ビクティニ']},
            {id: 495, name: 'ツタージャ', types: ['くさ'], generation: 5, description: 'たいようの ひかりを あびて しっぽで こうごうせいを おこなう。げんきが なくなると しっぽが たれる。', evolution: ['ツタージャ', 'ジャノビー', 'ジャローダ']},
            {id: 496, name: 'ジャノビー', types: ['くさ'], generation: 5, description: 'すべるような うごきで もりの なかを かけぬける。よごれた ばしょに いると はっぱが かれてしまう。', evolution: ['ツタージャ', 'ジャノビー', 'ジャローダ']},
            {id: 497, name: 'ジャローダ', types: ['くさ'], generation: 5, description: 'あいてを いあつする こうきな しせん。にらみつける だけで あいての うごきを とめる。', evolution: ['ツタージャ', 'ジャノビー', 'ジャローダ']},
            {id: 498, name: 'ポカブ', types: ['ほのお'], generation: 5, description: 'からだの なかで もえる ほのおを エネルギーにして はしりまわる。かぜを ひくと ほのおが けむりになる。', evolution: ['ポカブ', 'チャオブー', 'エンブオー']},
            {id: 499, name: 'チャオブー', types: ['ほのお', 'かくとう'], generation: 5, description: 'たいないの ほのおの エネルギーが ふえると スピードと パワーが ひやくてきに あがる。', evolution: ['ポカブ', 'チャオブー', 'エンブオー']},
            {id: 500, name: 'エンブオー', types: ['ほのお', 'かくとう'], generation: 5, description: 'あごから ほのおの ヒゲを もやす。パワーと スピードを かねそなえた かくとうの たつじん。', evolution: ['ポカブ', 'チャオブー', 'エンブオー']},
            {id: 501, name: 'ミジュマル', types: ['みず'], generation: 5, description: 'おなかの ホタチで たたかう。さしだされると ホタチを ぬくことなく はんげきする。', evolution: ['ミジュマル', 'フタチマル', 'ダイケンキ']},

            {id: 503, name: 'ダイケンキ', types: ['みず'], generation: 5, description: 'まえあしの そうこうの いちぶが きょだいな けんになっている。いちふりで あいてを きりふせる。', evolution: ['ミジュマル', 'フタチマル', 'ダイケンキ']},

            {id: 505, name: 'ミルホッグ', types: ['ノーマル'], generation: 5, description: 'たいもうを ひからせて あいてを いかくする。めの もようで さいみんじゅつを かけるのが とくい。', evolution: ['ミネズミ', 'ミルホッグ']},
            {id: 506, name: 'ヨーテリー', types: ['ノーマル'], generation: 5, description: 'かおの まわりの ながい けは ゆうしゅうな レーダー。まわりの ようすを すばやく さっちする。', evolution: ['ヨーテリー', 'ハーデリア', 'ムーランド']},
            {id: 507, name: 'ハーデリア', types: ['ノーマル'], generation: 5, description: 'とても ちゅうじつで かしこい ポケモン。トレーナーの いうことを ぜったいに まもって たたかう。', evolution: ['ヨーテリー', 'ハーデリア', 'ムーランド']},

            {id: 509, name: 'チョロネコ', types: ['あく'], generation: 5, description: 'あいくるしい しぐさで ひとを ゆだんさせ その すきに だいじな ものを ぬすんでしまう。', evolution: ['チョロネコ', 'レパルダス']},

            {id: 524, name: 'ダンゴロ', types: ['いわ'], generation: 5, description: 'みみの あなから エネルギーの かくが みえる。ちか ふかくで あっしゅくされた いわの からだ。', evolution: ['ダンゴロ', 'ガントル', 'ギガイアス']},

            377, 378, 379, 380, 381, 382, 383, 384,
            480, 481, 482, 483, 484, 485, 486, 487, 488,
            638, 639, 640, 641, 642, 643, 644, 646,
            716, 717, 718
        ]);

        // まぼろしのポケモン
        const mythicalIds = new Set([
            151, 251, 385, 386, 489, 490, 491, 492, 493, 494,
            647, 648, 649, 719, 720, 721, 801, 802, 807, 808, 809,
            893, 1025
        ]);

        // キョダイマックスできるポケモン
        const gmaxIds = new Set([
            3, 6, 9, 12, 25, 52, 68, 94, 99, 131, 133, 143, 569,

        ]);

        // キョダイマックスのすがたの がぞうID（PokeAPIフォームID）
        const gmaxForms = {
            3: 10195, 6: 10196, 9: 10197, 12: 10198, 25: 10199, 52: 10200,
            68: 10201, 94: 10202, 99: 10203, 131: 10204, 133: 10205, 143: 10206,
            569: 10207, 809: 10208, 812: 10209, 815: 10210, 818: 10211, 823: 10212,
            826: 10213, 834: 10214, 839: 10215, 841: 10216, 842: 10217, 844: 10218,
            849: 10219, 851: 10220, 858: 10221, 861: 10222, 869: 10223, 879: 10224,
            884: 10225, 892: 10226
        };

        // ぶんき・ついかしんかをふくむ しんかチェーン（ここにないポケモンはデータのevolutionをつかう）
        const EVOLUTION_FAMILIES = [
            ['イーブイ', 'シャワーズ'], ['イーブイ', 'サンダース'], ['イーブイ', 'ブースター'],
            ['イーブイ', 'エーフィ'], ['イーブイ', 'ブラッキー'], ['イーブイ', 'リーフィア'],
            ['イーブイ', 'グレイシア'], ['イーブイ', 'ニンフィア'],
            ['ヤドン', 'ヤドラン'], ['ヤドン', 'ヤドキング'],
            ['ニョロモ', 'ニョロゾ', 'ニョロボン'], ['ニョロモ', 'ニョロゾ', 'ニョロトノ'],
            ['ナゾノクサ', 'クサイハナ', 'ラフレシア'], ['ナゾノクサ', 'クサイハナ', 'キレイハナ'],
            ['バルキー', 'サワムラー'], ['バルキー', 'エビワラー'], ['バルキー', 'カポエラー'],
            ['ラルトス', 'キルリア', 'サーナイト'], ['ラルトス', 'キルリア', 'エルレイド'],
            ['ツチニン', 'テッカニン'], ['ツチニン', 'ヌケニン'],
            ['ユキワラシ', 'オニゴーリ'], ['ユキワラシ', 'ユキメノコ'],
            ['ケムッソ', 'カラサリス', 'アゲハント'], ['ケムッソ', 'マユルド', 'ドクケイル'],
            ['ミノムッチ', 'ミノマダム'], ['ミノムッチ', 'ガーメイル'],
            ['ウパー', 'ヌオー'], ['ウパー', 'ドオー'],
            ['ストライク', 'ハッサム'], ['ストライク', 'バサギリ'],
            ['ニューラ', 'マニューラ'], ['ニューラ', 'オオニューラ'],
            ['ニャース', 'ペルシアン'], ['ニャース', 'ニャイキング'],
            ['デスマス', 'デスカーン'], ['デスマス', 'デスバーン'],
            ['サニーゴ', 'サニゴーン'],
            ['カモネギ', 'ネギガナイト'],
            ['マネネ', 'バリヤード', 'バリコオル'],
            ['ジグザグマ', 'マッスグマ', 'タチフサグマ'],
            ['オドシシ', 'アヤシシ'],
            ['ヒメグマ', 'リングマ', 'ガチグマ'],
            ['ハリーセン', 'ハリーマン'],
            ['バスラオ', 'イダイトウ'],
            ['ノコッチ', 'ノココッチ'],
            ['キリンリキ', 'リキキリン'],
            ['コスモッグ', 'コスモウム', 'ソルガレオ'], ['コスモッグ', 'コスモウム', 'ルナアーラ'],
            ['カジッチュ', 'アップリュー'], ['カジッチュ', 'タルップル'], ['カジッチュ', 'カミッチュ'],
            ['カルボウ', 'グレンアルマ'], ['カルボウ', 'ソウブレイズ'],
            ['マンキー', 'オコリザル', 'コノヨザル'],
            ['コマタナ', 'キリキザン', 'ドドゲザン']
        ];
        const NAME_TO_CHAINS = {};
        EVOLUTION_FAMILIES.forEach(chain => chain.forEach(n => {
            (NAME_TO_CHAINS[n] = NAME_TO_CHAINS[n] || []).push(chain);
        }));

        // ===================================================================
        // じょうたい
        // ===================================================================
        const FAV_KEY = 'pokemon-favorites';
        let selectedTypes = new Set();
        let availableTypes = new Set(allTypes);
        let showFavOnly = false;
        let showLegendOnly = false;
        let showMythicOnly = false;
        let showGmaxOnly = false;
        let firstCharFilter = null;
        let lastCharFilter = null;
        let selectedEvoId = null;   // しんかチェーンで えらばれているポケモン

        function getFavorites() {
            try { return new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]')); }
            catch { return new Set(); }
        }
        function saveFavorites(favSet) {
            localStorage.setItem(FAV_KEY, JSON.stringify([...favSet]));
        }
        function isFavorite(id) { return getFavorites().has(id); }
        function toggleFavorite(id) {
            const favs = getFavorites();
            if (favs.has(id)) favs.delete(id); else favs.add(id);
            saveFavorites(favs);
            updateFavCount();
        }
        function updateFavCount() {
            const count = getFavorites().size;
            document.getElementById('favCount').textContent = count;
            document.getElementById('favFilterBtn').innerHTML =
                icon('star') + ` おきにいり (${count})`;
        }

        // ===================================================================
        // がぞうURL
        // ===================================================================
        function artworkUrl(id) {
            return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
        }
        function fallbackUrl(id) {
            return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
        }
        function imgTag(id, alt, cls) {
            return `<img class="${cls}" src="${artworkUrl(id)}" alt="${alt}" loading="lazy" decoding="async"
                onerror="if(!this.dataset.fb){this.dataset.fb=1;this.src='${fallbackUrl(id)}';}">`;
        }

        // ===================================================================
        // フィルタリング
        // ===================================================================
        function getFiltered(ignoreTypes = false) {
            const rawSearch = document.getElementById('searchInput').value.trim();
            const searchTerm = toHiragana(rawSearch.toLowerCase());
            const generation = document.getElementById('generationFilter').value;
            const favs = getFavorites();

            return pokemonData.filter(p => {
                const normalizedName = toHiragana(p.name.toLowerCase());
                const matchesSearch = !searchTerm && !rawSearch ||
                    normalizedName.includes(searchTerm) || String(p.id).includes(rawSearch);
                const matchesGeneration = !generation || p.generation === parseInt(generation);
                const matchesType = ignoreTypes || selectedTypes.size === 0 ||
                    [...selectedTypes].every(t => p.types.includes(t));
                const matchesFav = !showFavOnly || favs.has(p.id);
                const matchesLegend = !showLegendOnly || legendaryIds.has(p.id);
                const matchesMythic = !showMythicOnly || mythicalIds.has(p.id);
                const matchesGmax = !showGmaxOnly || gmaxIds.has(p.id);
                const matchesFirst = !firstCharFilter || toHiragana(p.name[0]) === firstCharFilter;
                const matchesLast = !lastCharFilter || toHiragana(p.name[p.name.length - 1]) === lastCharFilter;
                return matchesSearch && matchesGeneration && matchesType && matchesFav &&
                       matchesLegend && matchesMythic && matchesGmax && matchesFirst && matchesLast;
            });
        }

        function anyFilterActive() {
            return document.getElementById('searchInput').value.trim() !== '' ||
                document.getElementById('generationFilter').value !== '' ||
                selectedTypes.size > 0 || showFavOnly || showLegendOnly ||
                showMythicOnly || showGmaxOnly ||
                firstCharFilter !== null || lastCharFilter !== null;
        }

        function filterPokemon() {
            const filtered = getFiltered();
            renderPokemon(filtered);
            renderTypeFilters();
            document.getElementById('displayCount').textContent = filtered.length;
            document.getElementById('floatingReset').classList.toggle('show', anyFilterActive());
        }

        function resetAllFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('generationFilter').value = '';
            selectedTypes.clear();
            showFavOnly = showLegendOnly = showMythicOnly = showGmaxOnly = false;
            firstCharFilter = lastCharFilter = null;
            updateSpecialButtons();
            renderCharFilters();
            document.getElementById('charFilters').classList.remove('open');
            document.getElementById('charToggleBtn').classList.remove('open', 'active');
            filterPokemon();
        }

        // ===================================================================
        // レンダリング
        // ===================================================================
        function renderTypeFilters() {
            // タイプいがいのじょうけんでしぼったうえで、そんざいするタイプ + すでにえらんだタイプとくみあわせかのうなタイプ
            const base = getFiltered(true);
            availableTypes = new Set();
            base.forEach(p => {
                if (selectedTypes.size === 0 || [...selectedTypes].every(t => p.types.includes(t))) {
                    p.types.forEach(t => availableTypes.add(t));
                }
            });
            document.getElementById('typeFilters').innerHTML = allTypes.map(type => {
                const isActive = selectedTypes.has(type);
                const isAvailable = availableTypes.has(type);
                const classes = `type-chip${isActive ? ' active' : ''}${!isAvailable && !isActive ? ' disabled' : ''}`;
                return `<span class="${classes}" style="--type-color:${typeColors[type]}" data-type="${type}">${typeIcon(type)} ${type}</span>`;
            }).join('');
        }

        function renderCharFilters() {
            const firstChars = [...new Set(pokemonData.map(p => toHiragana(p.name[0])))].sort();
            const lastChars = [...new Set(pokemonData.map(p => toHiragana(p.name[p.name.length - 1])))].sort();
            document.getElementById('firstCharButtons').innerHTML = firstChars.map(ch =>
                `<button class="char-btn${firstCharFilter === ch ? ' active' : ''}" data-char="${ch}" data-mode="first">${ch}</button>`
            ).join('');
            document.getElementById('lastCharButtons').innerHTML = lastChars.map(ch =>
                `<button class="char-btn${lastCharFilter === ch ? ' active' : ''}" data-char="${ch}" data-mode="last">${ch}</button>`
            ).join('');

            const hasFilter = firstCharFilter !== null || lastCharFilter !== null;
            const toggleBtn = document.getElementById('charToggleBtn');
            const panel = document.getElementById('charFilters');
            toggleBtn.classList.toggle('active', hasFilter);
            if (hasFilter && !panel.classList.contains('open')) {
                panel.classList.add('open');
                toggleBtn.classList.add('open');
            }
        }

        function miniTypeChips(types) {
            return types.map(t =>
                `<span class="mini-type" style="--type-color:${typeColors[t]}">${typeIcon(t)}${t}</span>`
            ).join('');
        }

        function renderPokemon(list) {
            const grid = document.getElementById('pokemonGrid');
            if (list.length === 0) {
                grid.innerHTML = `<div class="no-results">
                    ${icon('search2')}
                    <p>ポケモンが みつからないよ</p>
                    <p style="font-size:0.85rem;">じょうけんを かえて さがしてみてね</p>
                </div>`;
                return;
            }
            const favs = getFavorites();
            grid.innerHTML = list.map(p => {
                const fav = favs.has(p.id);
                const color = typeColors[p.types[0]] || '#9099A1';
                let badge = '';
                if (legendaryIds.has(p.id)) badge = `<span class="card-badge legend" title="でんせつのポケモン">${icon('crown')}</span>`;
                else if (mythicalIds.has(p.id)) badge = `<span class="card-badge mythic" title="まぼろしのポケモン">${icon('sparkle')}</span>`;
                return `
                <div class="pokemon-card" data-id="${p.id}" style="--type-color:${color}">
                    <div class="card-bg"></div>
                    ${badge}
                    <button class="fav-btn${fav ? ' active' : ''}" data-fav-id="${p.id}" aria-label="おきにいり">${icon('star')}</button>
                    <span class="pokemon-number">No.${String(p.id).padStart(4, '0')}</span>
                    <div class="pokemon-image-container">${imgTag(p.id, p.name, 'pokemon-image')}</div>
                    <div class="pokemon-name">${p.name}</div>
                    <div class="pokemon-types">${miniTypeChips(p.types)}</div>
                </div>`;
            }).join('');
        }

        // ===================================================================
        // モーダル
        // ===================================================================
        function showModal(id) {
            const p = pokemonData.find(x => x.id === id);
            if (!p) return;
            selectedEvoId = null;
            const color = typeColors[p.types[0]] || '#9099A1';
            const fav = isFavorite(p.id);

            let badges = '';
            if (legendaryIds.has(p.id)) badges += `<span class="modal-badge legend">${icon('crown')} でんせつ</span>`;
            if (mythicalIds.has(p.id)) badges += `<span class="modal-badge mythic">${icon('sparkle')} まぼろし</span>`;
            if (gmaxIds.has(p.id)) badges += `<span class="modal-badge gmax">${icon('gmax')} キョダイマックス</span>`;

            // しんかチェーン（ぶんきがあるポケモンは ふくすうチェーンをひょうじ）
            let evoHtml = '';
            const chains = NAME_TO_CHAINS[p.name] ||
                ((p.evolution && p.evolution.length > 1) ? [p.evolution] : []);
            if (chains.length > 0) {
                const chainHtml = chains.map(chain => {
                    const items = chain.map(evoName => {
                        const evoData = pokemonData.find(x => x.name === evoName.split('/')[0]);
                        const isCurrent = evoData && evoData.id === p.id;
                        const isClickable = evoData && !isCurrent;
                        const cls = `evolution-item${isClickable ? ' clickable' : ''}${isCurrent ? ' current' : ''}`;
                        const attr = isClickable ? ` data-evo-id="${evoData.id}" data-evo-name="${evoData.name}"` : '';
                        const img = evoData ? imgTag(evoData.id, evoName, '') : '';
                        return `<div class="${cls}"${attr}>
                            ${img}
                            <div class="evolution-name">${evoName}</div>
                            ${isCurrent ? '<span class="current-tag">いまのページ</span>' : ''}
                        </div>`;
                    });
                    return `<div class="evolution-chain">${items.join(`<span class="evo-arrow">${icon('arrowRight')}</span>`)}</div>`;
                }).join('');
                evoHtml = `
                <div class="detail-section">
                    <h3>${icon('evo')} しんかチェーン${chains.length > 1 ? `（${chains.length}とおり）` : ''}</h3>
                    <div class="evolution-chains">${chainHtml}</div>
                    <div class="evo-go-bar" id="evoGoBar">
                        <button class="evo-go-btn" id="evoGoBtn"></button>
                    </div>
                </div>`;
            } else {
                evoHtml = `
                <div class="detail-section">
                    <h3>${icon('evo')} しんかチェーン</h3>
                    <div class="evolution-chain"><span style="color:var(--text-sub);font-size:0.9rem;font-weight:700;">しんかしない ポケモンだよ</span></div>
                </div>`;
            }

            document.getElementById('modalContent').innerHTML = `
                <div class="modal-hero" style="--type-color:${color}">
                    <button class="close-modal" id="closeModal" aria-label="とじる">${icon('x')}</button>
                    <button class="fav-btn modal-fav${fav ? ' active' : ''}" data-fav-id="${p.id}" aria-label="おきにいり">${icon('star')}</button>
                    <div class="modal-number">No.${String(p.id).padStart(4, '0')}</div>
                    ${imgTag(p.id, p.name, '')}
                    <h2>${p.name}</h2>
                    <div class="pokemon-types">${miniTypeChips(p.types)}</div>
                    ${badges ? `<div class="modal-badges">${badges}</div>` : ''}
                </div>
                <div class="modal-body">
                    <div class="detail-section">
                        <h3>${icon('book')} せつめい</h3>
                        <div class="description-text">${p.description}</div>
                    </div>
                    <div class="detail-section">
                        <h3>${icon('info')} データ</h3>
                        <div class="info-grid">
                            <div class="info-tile">
                                <div class="label">ずかんばんごう</div>
                                <div class="value">No.${String(p.id).padStart(4, '0')}</div>
                            </div>
                            <div class="info-tile">
                                <div class="label">せだい</div>
                                <div class="value">だい${p.generation}せだい</div>
                            </div>
                            <div class="info-tile games">
                                <div class="label">とうじょうした ゲーム</div>
                                <div class="value">${generationGames[p.generation] || '?'}</div>
                            </div>
                        </div>
                    </div>
                    ${evoHtml}
                    ${gmaxForms[p.id] ? `
                    <div class="detail-section">
                        <h3>${icon('gmax')} キョダイマックスの すがた</h3>
                        <div class="gmax-figure">
                            ${imgTag(gmaxForms[p.id], p.name + ' キョダイマックスのすがた', 'gmax-img')}
                            <div class="gmax-caption">キョダイマックス ${p.name}</div>
                        </div>
                    </div>` : ''}
                </div>`;

            const modal = document.getElementById('modal');
            modal.classList.add('show');
            modal.scrollTop = 0;
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            document.body.style.overflow = '';
            selectedEvoId = null;
        }

        // しんかチェーン：がぞうをえらぶ → ボタンをおして いどう
        function selectEvolution(item) {
            const id = parseInt(item.dataset.evoId);
            const name = item.dataset.evoName;
            const bar = document.getElementById('evoGoBar');
            const btn = document.getElementById('evoGoBtn');
            if (selectedEvoId === id) {
                // もういちどおすと えらびなおし（とじる）
                selectedEvoId = null;
                item.classList.remove('selected');
                bar.classList.remove('show');
                return;
            }
            selectedEvoId = id;
            document.querySelectorAll('.evolution-item.selected').forEach(el => el.classList.remove('selected'));
            item.classList.add('selected');
            btn.innerHTML = `${name} の ずかんを みる ${icon('arrowRight')}`;
            bar.classList.add('show');
        }

        // ===================================================================
        // イベント
        // ===================================================================
        function attachEventListeners() {
            document.getElementById('searchInput').addEventListener('input', filterPokemon);
            document.getElementById('generationFilter').addEventListener('change', filterPokemon);

            document.getElementById('clearFiltersBtn').addEventListener('click', resetAllFilters);
            document.getElementById('floatingReset').addEventListener('click', resetAllFilters);

            document.getElementById('charToggleBtn').addEventListener('click', () => {
                const panel = document.getElementById('charFilters');
                const btn = document.getElementById('charToggleBtn');
                const isOpen = panel.classList.toggle('open');
                btn.classList.toggle('open', isOpen);
            });

            document.getElementById('typeFilters').addEventListener('click', (e) => {
                const chip = e.target.closest('.type-chip');
                if (!chip || chip.classList.contains('disabled')) return;
                const type = chip.dataset.type;
                if (selectedTypes.has(type)) selectedTypes.delete(type);
                else selectedTypes.add(type);
                filterPokemon();
            });

            document.getElementById('charFilters').addEventListener('click', (e) => {
                const btn = e.target.closest('.char-btn');
                if (!btn) return;
                const ch = btn.dataset.char;
                if (btn.dataset.mode === 'first') firstCharFilter = (firstCharFilter === ch) ? null : ch;
                else lastCharFilter = (lastCharFilter === ch) ? null : ch;
                renderCharFilters();
                filterPokemon();
            });

            const specials = [
                ['favFilterBtn',    () => showFavOnly    = !showFavOnly],
                ['legendFilterBtn', () => showLegendOnly = !showLegendOnly],
                ['mythicFilterBtn', () => showMythicOnly = !showMythicOnly],
                ['gmaxFilterBtn',   () => showGmaxOnly   = !showGmaxOnly]
            ];
            specials.forEach(([btnId, toggle]) => {
                document.getElementById(btnId).addEventListener('click', () => {
                    toggle();
                    updateSpecialButtons();
                    filterPokemon();
                });
            });

            document.getElementById('favStatItem').addEventListener('click', () => {
                showFavOnly = !showFavOnly;
                updateSpecialButtons();
                filterPokemon();
            });

            document.getElementById('pokemonGrid').addEventListener('click', (e) => {
                const favBtn = e.target.closest('.fav-btn');
                if (favBtn) {
                    e.stopPropagation();
                    const id = parseInt(favBtn.dataset.favId);
                    toggleFavorite(id);
                    favBtn.classList.toggle('active', isFavorite(id));
                    if (showFavOnly) filterPokemon();
                    return;
                }
                const card = e.target.closest('.pokemon-card');
                if (card) showModal(parseInt(card.dataset.id));
            });

            const modal = document.getElementById('modal');
            modal.addEventListener('click', (e) => {
                if (e.target === modal) { closeModal(); return; }
                if (e.target.closest('#closeModal')) { closeModal(); return; }

                const favBtn = e.target.closest('.fav-btn');
                if (favBtn) {
                    const id = parseInt(favBtn.dataset.favId);
                    toggleFavorite(id);
                    favBtn.classList.toggle('active', isFavorite(id));
                    if (showFavOnly) filterPokemon();
                    else renderPokemon(getFiltered());
                    return;
                }
                const evoItem = e.target.closest('.evolution-item.clickable');
                if (evoItem) { selectEvolution(evoItem); return; }

                if (e.target.closest('#evoGoBtn') && selectedEvoId !== null) {
                    showModal(selectedEvoId);
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
            });

            const backBtn = document.getElementById('backToTop');
            window.addEventListener('scroll', () => {
                backBtn.classList.toggle('show', window.scrollY > 400);
            }, { passive: true });
            backBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        }

        function updateSpecialButtons() {
            const favBtn = document.getElementById('favFilterBtn');
            favBtn.classList.toggle('active', showFavOnly);
            const legendBtn = document.getElementById('legendFilterBtn');
            legendBtn.classList.toggle('active', showLegendOnly);
            const mythicBtn = document.getElementById('mythicFilterBtn');
            mythicBtn.classList.toggle('active', showMythicOnly);
            const gmaxBtn = document.getElementById('gmaxFilterBtn');
            gmaxBtn.classList.toggle('active', showGmaxOnly);
        }

        // ===================================================================
        // テーマ
        // ===================================================================
        function applyThemeIcon() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.getElementById('themeToggle').innerHTML = icon(isDark ? 'sun' : 'moon');
        }
        function initTheme() {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = saved || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
            applyThemeIcon();
            document.getElementById('themeToggle').addEventListener('click', () => {
                const cur = document.documentElement.getAttribute('data-theme');
                const next = cur === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                applyThemeIcon();
            });
        }

        // ===================================================================
        // しょきか
        // ===================================================================
        function initStaticIcons() {
            document.getElementById('legendFilterBtn').innerHTML = icon('crown') + ' でんせつ';
            document.getElementById('mythicFilterBtn').innerHTML = icon('sparkle') + ' まぼろし';
            document.getElementById('gmaxFilterBtn').innerHTML = icon('gmax') + ' キョダイマックス';
            document.getElementById('clearFiltersBtn').innerHTML = icon('reset') + ' リセット';
            document.getElementById('charToggleBtn').innerHTML =
                icon('text') + ' もじで しぼりこむ ' + icon('chevron', UI_ICONS, 'icon chev');
            document.getElementById('backToTop').innerHTML = icon('arrowUp');
            document.getElementById('floatingReset').innerHTML = icon('reset') + ' リセット';
            document.getElementById('favStatLabel').innerHTML = icon('star') + ' おきにいり';
        }

        function init() {
            pokemonData.sort((a, b) => a.id - b.id);
            document.getElementById('totalCount').textContent = pokemonData.length;
            initTheme();
            initStaticIcons();
            renderCharFilters();
            attachEventListeners();
            updateFavCount();
            filterPokemon();
        }

        init();
    </script>
</body>
